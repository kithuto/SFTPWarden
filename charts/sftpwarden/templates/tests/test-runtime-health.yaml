apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "sftpwarden.name" . }}-test-runtime-health"
  namespace: {{ include "sftpwarden.namespace" . }}
  labels:
    {{- include "sftpwarden.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: runtime-health
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      command: ["sftpwarden", "runtime", "health", "--config", "/etc/sftpwarden/sftpwarden.yaml"]
      volumeMounts:
        - name: config
          mountPath: /etc/sftpwarden/sftpwarden.yaml
          subPath: sftpwarden.yaml
          readOnly: true
        - name: data
          mountPath: /data
          readOnly: true
        - name: state
          mountPath: /var/lib/sftpwarden
          readOnly: true
        - name: host-keys
          mountPath: /etc/sftpwarden/host_keys
          readOnly: true
        {{- if .Values.persistence.provider.enabled }}
        - name: provider
          mountPath: /etc/sftpwarden/provider-data
          readOnly: true
        {{- end }}
  volumes:
    - name: config
      configMap:
        name: {{ include "sftpwarden.name" . }}-config
    - name: data
      persistentVolumeClaim:
        claimName: {{ include "sftpwarden.name" . }}-data
        readOnly: true
    - name: state
      persistentVolumeClaim:
        claimName: {{ include "sftpwarden.name" . }}-state
        readOnly: true
    - name: host-keys
      emptyDir: {}
    {{- if .Values.persistence.provider.enabled }}
    - name: provider
      persistentVolumeClaim:
        claimName: {{ include "sftpwarden.name" . }}-provider
        readOnly: true
    {{- end }}
