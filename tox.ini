[tox]
env_list = lint, py311, py312, py313, docs, package, audit

[testenv]
package = editable
deps =
    pytest>=9.0.3
    pytest-cov
commands =
    python -m pytest --cov=sftpwarden --cov-report=term-missing {posargs}

[testenv:lint]
package = skip
deps =
    ruff
commands =
    python -m ruff format --check .
    python -m ruff check .

[testenv:docs]
package = editable
deps =
    myst-parser
    sphinx
    sphinx-rtd-theme
commands =
    python -m sphinx -b html docs docs/_build/html

[testenv:package]
package = skip
deps =
    build
commands =
    python -m build
    python -c "import pathlib, zipfile; wheels = sorted(pathlib.Path('dist').glob('sftpwarden-*.whl')); assert wheels, 'wheel not built'; names = zipfile.ZipFile(wheels[-1]).namelist(); assert 'sftpwarden/__init__.py' in names, 'wheel does not contain sftpwarden package'; assert not any('__pycache__' in name or name.startswith(('docs/_build/', '.tox/')) for name in names), 'wheel contains generated artifacts'"

[testenv:audit]
package = editable
extras =
    watch
    mysql
    postgres
deps =
    pip-audit
commands_pre =
    python -m pip install --upgrade pip
commands =
    python -m pip_audit --skip-editable
