[tox]
env_list = lint, py311, py312, py313, docs, package

[testenv]
package = editable
deps =
    pytest
commands =
    python -m pytest {posargs}

[testenv:lint]
package = skip
deps =
    ruff
commands =
    python -m ruff format --check .
    python -m ruff check .

[testenv:docs]
package = editable
deps =
    myst-parser
    sphinx
    sphinx-rtd-theme
commands =
    python -m sphinx -b html docs docs/_build/html

[testenv:package]
package = skip
deps =
    build
commands =
    python -m build
    python -c "import pathlib, zipfile; wheels = sorted(pathlib.Path('dist').glob('sftpwarden-*.whl')); assert wheels, 'wheel not built'; names = zipfile.ZipFile(wheels[-1]).namelist(); assert any(name == 'sftpwarden/__init__.py' for name in names), 'wheel does not contain sftpwarden package'"
