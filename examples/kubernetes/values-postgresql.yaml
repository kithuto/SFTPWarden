image:
  repository: ghcr.io/kithuto/sftpwarden
  tag: ""

runtime:
  replicas: 1

sftpwardenConfig: |
  version: 1
  project:
    name: sftpwarden
    description: SFTPWarden PostgreSQL Kubernetes example
  provider:
    type: postgresql
    dsn: "${SFTPWARDEN_PROVIDER_DSN}"
    table: sftp_users
    user_schema: 2

service:
  type: ClusterIP

kubernetes:
  namespace: sftpwarden
  release: sftpwarden
  storageClass: standard

provider:
  type: postgresql
  dsnSecretName: sftpwarden-provider
  dsnSecretKey: SFTPWARDEN_PROVIDER_DSN
  createDsnSecret: false

persistence:
  data:
    enabled: true
    size: 10Gi
  state:
    enabled: true
    size: 1Gi
  provider:
    enabled: false

probes:
  startup:
    failureThreshold: 30
    periodSeconds: 5
    timeoutSeconds: 5
  readiness:
    failureThreshold: 3
    periodSeconds: 10
    timeoutSeconds: 5
  liveness:
    failureThreshold: 3
    periodSeconds: 30
    timeoutSeconds: 5
