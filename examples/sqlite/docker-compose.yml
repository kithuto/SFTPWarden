services:
  sftpwarden:
    image: sftpwarden:local
    build:
      context: ../..
      dockerfile: docker/runtime/Dockerfile
    ports:
      - "2222:22"
    volumes:
      - ./sftpwarden.yaml:/etc/sftpwarden/sftpwarden.yaml:ro
      - ./users.sqlite:/etc/sftpwarden/users.sqlite:ro
      - ./data:/data
      - ./state:/var/lib/sftpwarden
      - ./host_keys:/etc/sftpwarden/host_keys
