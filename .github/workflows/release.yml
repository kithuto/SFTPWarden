name: Release

on:
  push:
    branches: [main]
    paths:
      - "sftpwarden/**"
      - "pyproject.toml"
      - "README.md"
      - "LICENSE"
      - "CHANGELOG.md"
      - ".github/workflows/release.yml"

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Verify package versions and change
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import subprocess
          import tomllib
          from pathlib import Path

          import sftpwarden

          def read_version(text: str) -> str:
              return tomllib.loads(text)["project"]["version"]

          package_version = read_version(Path("pyproject.toml").read_text(encoding="utf-8"))
          module_version = sftpwarden.__version__
          if package_version != module_version:
              raise SystemExit(
                  f"pyproject={package_version} module={module_version}"
              )

          previous = ""
          before = os.environ.get("BEFORE_SHA", "")
          if before and before != "0" * 40:
              result = subprocess.run(
                  ["git", "show", f"{before}:pyproject.toml"],
                  capture_output=True,
                  check=False,
                  text=True,
              )
              if result.returncode == 0:
                  previous = read_version(result.stdout)

          changed = previous != package_version
          print(f"version={package_version}")
          print(f"previous_version={previous}")
          print(f"changed={str(changed).lower()}")
          PY

  package:
    needs: verify
    if: needs.verify.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sftpwarden

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-package
          path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0

  github-release:
    needs: [verify, package]
    if: needs.verify.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: v${{ needs.verify.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: dist/*
          generate_release_notes: true
