name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  WATCHER_IMAGE_NAME: ${{ github.repository }}-watcher

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@v1.14.0

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-package
          path: dist/*

  images:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Runtime metadata
        id: runtime-meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Watcher metadata
        id: watcher-meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.WATCHER_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Publish runtime image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/runtime/Dockerfile
          push: true
          tags: ${{ steps.runtime-meta.outputs.tags }}
          labels: ${{ steps.runtime-meta.outputs.labels }}

      - name: Publish watcher image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/watcher/Dockerfile
          push: true
          tags: ${{ steps.watcher-meta.outputs.tags }}
          labels: ${{ steps.watcher-meta.outputs.labels }}

  github-release:
    needs: [package, images]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Download package artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.1
        with:
          files: dist/*
          generate_release_notes: true
