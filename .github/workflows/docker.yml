name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  WATCHER_IMAGE_NAME: ${{ github.repository }}-watcher

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Runtime metadata
        id: runtime-meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Watcher metadata
        id: watcher-meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.WATCHER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build runtime image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/runtime/Dockerfile
          load: true
          tags: sftpwarden:ci

      - name: Runtime smoke test
        run: |
          docker run --rm --entrypoint sh sftpwarden:ci -c 'command -v sshd && command -v sftpwarden'

      - name: Build watcher image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/watcher/Dockerfile
          load: true
          tags: sftpwarden-watcher:ci

      - name: Watcher smoke test
        run: |
          docker run --rm --entrypoint sh sftpwarden-watcher:ci -c 'command -v sftpwarden'

      - name: Publish runtime image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/runtime/Dockerfile
          push: true
          tags: ${{ steps.runtime-meta.outputs.tags }}
          labels: ${{ steps.runtime-meta.outputs.labels }}

      - name: Publish watcher image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: docker/watcher/Dockerfile
          push: true
          tags: ${{ steps.watcher-meta.outputs.tags }}
          labels: ${{ steps.watcher-meta.outputs.labels }}
