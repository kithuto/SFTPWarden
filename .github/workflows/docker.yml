name: Docker

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "sftpwarden/**"
      - "charts/**"
      - "pyproject.toml"
      - ".dockerignore"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  WATCHER_IMAGE_NAME: ${{ github.repository }}-watcher

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Check package version change
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import subprocess
          import tomllib
          from pathlib import Path

          def read_version(text: str) -> str:
              return tomllib.loads(text)["project"]["version"]

          current = read_version(Path("pyproject.toml").read_text(encoding="utf-8"))
          previous = ""
          before = os.environ.get("BEFORE_SHA", "")
          if before and before != "0" * 40:
              result = subprocess.run(
                  ["git", "show", f"{before}:pyproject.toml"],
                  capture_output=True,
                  check=False,
                  text=True,
              )
              if result.returncode == 0:
                  previous = read_version(result.stdout)

          changed = previous != current
          print(f"version={current}")
          print(f"previous_version={previous}")
          print(f"changed={str(changed).lower()}")
          PY

  build:
    needs: version
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Runtime metadata
        id: runtime-meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest

      - name: Watcher metadata
        id: watcher-meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.WATCHER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest

      - name: Build runtime image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/runtime/Dockerfile
          load: true
          tags: sftpwarden:ci

      - name: Runtime smoke test
        run: |
          docker run --rm --entrypoint sh sftpwarden:ci -c 'command -v sshd && command -v sftpwarden && sftpwarden --version && grep -q "^Port 22$" /etc/ssh/sshd_config'

      - name: Build watcher image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/watcher/Dockerfile
          load: true
          tags: sftpwarden-watcher:ci

      - name: Watcher smoke test
        run: |
          docker run --rm --entrypoint sh sftpwarden-watcher:ci -c 'command -v sftpwarden && sftpwarden --version && test ! -S /var/run/docker.sock'

      - name: Publish runtime image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/runtime/Dockerfile
          push: true
          tags: ${{ steps.runtime-meta.outputs.tags }}
          labels: ${{ steps.runtime-meta.outputs.labels }}

      - name: Publish watcher image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: docker/watcher/Dockerfile
          push: true
          tags: ${{ steps.watcher-meta.outputs.tags }}
          labels: ${{ steps.watcher-meta.outputs.labels }}

  publish-helm-chart:
    needs: [version, build]
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1

      - name: Verify Helm chart version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          python tools/verify_helm_release_metadata.py --version "$VERSION"

      - name: Log in to GHCR for Helm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish Helm chart
        env:
          VERSION: ${{ needs.version.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        shell: bash
        run: |
          set -euo pipefail
          owner="${OWNER,,}"
          mkdir -p dist
          helm lint charts/sftpwarden
          helm package charts/sftpwarden --destination dist --version "$VERSION" --app-version "$VERSION"
          helm push "dist/sftpwarden-${VERSION}.tgz" "oci://ghcr.io/${owner}/charts"
