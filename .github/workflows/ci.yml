name: CI

on:
  push:
    branches: [dev]
    paths:
      - "sftpwarden/**"
      - "tests/**"
      - "examples/**"
      - "charts/**"
      - "docker/**"
      - "pyproject.toml"
      - "tox.ini"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [dev]
    paths:
      - "sftpwarden/**"
      - "tests/**"
      - "examples/**"
      - "charts/**"
      - "docker/**"
      - "pyproject.toml"
      - "tox.ini"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            tox-env: py311
          - python-version: "3.12"
            tox-env: py312
          - python-version: "3.13"
            tox-env: py313
          - python-version: "3.14"
            tox-env: py314

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox

      - name: Run tests
        run: tox -e ${{ matrix.tox-env }}

  quality:
    name: Lint, package, and examples
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
          cache: pip

      - name: Install tox and package
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox
          python -m pip install -e ".[mysql,postgres,mongodb]"

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.1

      - name: Run lint and package checks
        run: tox -e lint,package

      - name: Validate examples
        run: |
          sftpwarden validate --config examples/yaml/sftpwarden.yaml
          sftpwarden validate --config examples/csv/sftpwarden.yaml
          sftpwarden validate --config examples/sqlite/sftpwarden.yaml
          SFTPWARDEN_MYSQL_DSN=mysql://user:pass@localhost/sftp sftpwarden validate --config examples/mysql/sftpwarden.yaml
          SFTPWARDEN_MARIADB_DSN=mariadb://user:pass@localhost/sftp sftpwarden validate --config examples/mariadb/sftpwarden.yaml
          SFTPWARDEN_POSTGRES_DSN=postgresql://user:pass@localhost/sftp sftpwarden validate --config examples/postgres/sftpwarden.yaml
          SFTPWARDEN_MONGODB_DSN=mongodb://localhost:27017/sftp sftpwarden validate --config examples/mongodb/sftpwarden.yaml

      - name: Validate compose generation
        run: |
          sftpwarden compose --config examples/yaml/sftpwarden.yaml > /tmp/sftpwarden-compose.yml
          test -s /tmp/sftpwarden-compose.yml

      - name: Validate Kubernetes chart and manifests
        run: |
          helm lint charts/sftpwarden
          helm template sftpwarden charts/sftpwarden > /tmp/sftpwarden-chart.yml
          test -s /tmp/sftpwarden-chart.yml
          mkdir -p /tmp/sftpwarden-kube
          sftpwarden init kube --root /tmp/sftpwarden-kube --deploy kube --yes --skip-checks
          sftpwarden kube render --config /tmp/sftpwarden-kube/sftpwarden.yaml > /tmp/sftpwarden-kube.yml
          test -s /tmp/sftpwarden-kube.yml
