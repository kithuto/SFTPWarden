version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      python-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/docker/runtime"
      - "/docker/watcher"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      docker-images:
        patterns:
          - "*"

  - package-ecosystem: "docker-compose"
    directories:
      - "/examples/csv"
      - "/examples/mariadb"
      - "/examples/mysql"
      - "/examples/mongodb"
      - "/examples/postgres"
      - "/examples/sqlite"
      - "/examples/watcher-docker"
      - "/examples/yaml"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      compose-images:
        patterns:
          - "*"
